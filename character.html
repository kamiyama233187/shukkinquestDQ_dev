<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャラクターカスタム</title>

<style>

body{
background:black;
color:white;
font-family:monospace;
text-align:center;
}

/* プレビュー */

.preview{
width:128px;
height:128px;
margin:auto;
position:relative;
overflow:hidden;
border:2px solid white;
}

.preview img{

position:absolute;
left:0;
top:0;

width:192px;
height:256px;

image-rendering:pixelated;

transform:translate(-96px,-192px) scale(2);
transform-origin:top left;

}

/* タブ */

.tabs{
display:flex;
justify-content:center;
gap:8px;
margin:10px;
flex-wrap:wrap;
}

.tabs button{
background:black;
color:white;
border:2px solid white;
padding:6px 10px;
font-size:14px;
}

/* パーツ一覧 */

.parts{
display:none;
flex-wrap:wrap;
justify-content:center;
gap:6px;
max-height:260px;
overflow:auto;
border:2px solid white;
padding:10px;
margin:10px;
}

.parts img{

width:64px;
height:64px;

object-fit:none;

image-rendering:pixelated;

/* 正面フレーム */
object-position:-64px -192px;

cursor:pointer;

border:1px solid #444;

}

.parts img:hover{
border:1px solid white;
}

/* ボタン */

button{
background:black;
color:white;
border:2px solid white;
padding:8px 15px;
margin:6px;
font-size:16px;
}

button:active{
background:white;
color:black;
}

</style>
</head>

<body>

<h2>キャラクターカスタム</h2>

<div class="preview">

<img id="body">
<img id="legs">
<img id="clothes">
<img id="hair">

</div>

<br>

<button onclick="randomChar()">🎲 ランダム</button>
<button onclick="saveChar()">保存</button>
<button onclick="location.href='sugoroku.html'">戻る</button>

<div class="tabs">

<button onclick="showTab('body')">体</button>
<button onclick="showTab('legs')">ズボン</button>
<button onclick="showTab('hair')">髪</button>
<button onclick="showTab('clothes')">服</button>

</div>

<div id="bodyList" class="parts"></div>
<div id="legsList" class="parts"></div>
<div id="hairList" class="parts"></div>
<div id="clothesList" class="parts"></div>

<script>

const STORAGE_KEY = "shukkinQuestData_v3";

let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

if(!state.player){
state.player = {
body:0,
legs:0,
hair:0,
armor:0
};
}

/* 数 */

const bodyCount = 52;
const hairCount = 416;
const clothesCount = 562;
const legsCount = 142;

/* リスト */

const bodyList=document.getElementById("bodyList");
const legsList=document.getElementById("legsList");
const hairList=document.getElementById("hairList");
const clothesList=document.getElementById("clothesList");

/* body */

for(let i=0;i<bodyCount;i++){

const img=document.createElement("img");

img.src="assets/body/body"+i+".png";

img.onclick=()=>{

state.player.body=i;
render();

};

bodyList.appendChild(img);

}

/* legs */

for(let i=0;i<legsCount;i++){

const img=document.createElement("img");

img.src="assets/legs/legs"+i+".png";

img.onclick=()=>{

state.player.legs=i;
render();

};

legsList.appendChild(img);

}

/* hair */

for(let i=0;i<hairCount;i++){

const img=document.createElement("img");

img.src="assets/hair/hair"+i+".png";

img.onclick=()=>{

state.player.hair=i;
render();

};

hairList.appendChild(img);

}

/* clothes */

for(let i=0;i<clothesCount;i++){

const img=document.createElement("img");

img.src="assets/clothes/clothes"+i+".png";

img.onclick=()=>{

state.player.armor=i;
render();

};

clothesList.appendChild(img);

}

/* 描画 */

function render(){

document.getElementById("body").src =
"assets/body/body"+state.player.body+".png";

document.getElementById("legs").src =
"assets/legs/legs"+state.player.legs+".png";

document.getElementById("hair").src =
"assets/hair/hair"+state.player.hair+".png";

document.getElementById("clothes").src =
"assets/clothes/clothes"+state.player.armor+".png";

}

/* ランダム */

function randomChar(){

state.player.body =
Math.floor(Math.random()*bodyCount);

state.player.legs =
Math.floor(Math.random()*legsCount);

state.player.hair =
Math.floor(Math.random()*hairCount);

state.player.armor =
Math.floor(Math.random()*clothesCount);

render();

}

/* 保存 */

function saveChar(){

localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

alert("保存しました");

}

/* タブ */

function showTab(name){

document.querySelectorAll(".parts").forEach(el=>{
el.style.display="none";
});

document.getElementById(name+"List").style.display="flex";

}

/* 初期表示 */

showTab("body");

render();

</script>

</body>
</html>
