<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>キャラカスタム</title>

<style>

body{
background:black;
color:white;
font-family:monospace;
text-align:center;
}

/* プレビュー */

.preview{
width:64px;
height:64px;
position:relative;
overflow:hidden;
margin:auto;
}

.preview img{
position:absolute;
left:0;
top:0;

width:512px;
height:256px;

object-fit:none;

image-rendering:pixelated;
}

/* タブ */

.tabs{
margin-top:10px;
}

.tabs button{
margin:3px;
}

/* パーツ */

.parts{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;

max-height:220px;
overflow:auto;

border:2px solid white;
padding:10px;
margin:10px;
}

.parts img{

width:48px;
height:48px;

object-fit:none;
object-position:-64px -128px;

image-rendering:pixelated;
cursor:pointer;
border:1px solid #444;

}

.parts img:hover{
border:1px solid white;
}

.parts img.selected{
border:2px solid gold;
box-shadow:0 0 6px gold;
}

#legsList img{
object-position:-64px -127px;
}

/* ボタン */

button{
background:black;
color:white;
border:2px solid white;
padding:8px 15px;
margin:6px;
font-size:16px;
}

button:active{
background:white;
color:black;
}

</style>
</head>

<body>

<h2>キャラクターカスタム</h2>

<div class="preview">

<img id="body">
<img id="legs">
<img id="clothes">
<img id="hair">

</div>

<br>

<button onclick="randomChar()">🎲 ランダム</button>
<button onclick="saveChar()">保存</button>
<button onclick="location.href='sugoroku.html'">戻る</button>

<br>

<button onclick="removeLegs()">ズボン外す</button>
<button onclick="removeHair()">髪外す</button>
<button onclick="removeClothes()">服外す</button>

<div class="tabs">

<button onclick="showTab('body')">体</button>
<button onclick="showTab('legs')">ズボン</button>
<button onclick="showTab('hair')">髪</button>
<button onclick="showTab('clothes')">服</button>

</div>

<div id="bodyList" class="parts"></div>
<div id="legsList" class="parts" style="display:none"></div>
<div id="hairList" class="parts" style="display:none"></div>
<div id="clothesList" class="parts" style="display:none"></div>

<script>

const STORAGE_KEY = "shukkinQuestData_v3";

let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

if(!state.player){
state.player = {
body:0,
legs:0,
hair:0,
armor:0
};
}

/* 数 */

const bodyCount = 52;
const legsCount = 142;
const hairCount = 416;
const clothesCount = 562;

/* リスト */

const bodyList=document.getElementById("bodyList");
const legsList=document.getElementById("legsList");
const hairList=document.getElementById("hairList");
const clothesList=document.getElementById("clothesList");

/* body */

for(let i=0;i<bodyCount;i++){

const img=document.createElement("img");

img.src="assets/body/body"+i+".png";

img.onclick=()=>{

state.player.body=i;
render();

};

bodyList.appendChild(img);

}

/* legs */

for(let i=0;i<legsCount;i++){

const img=document.createElement("img");

img.src="assets/legs/legs"+i+".png";

img.onclick=()=>{

state.player.legs=i;
render();

};

legsList.appendChild(img);

}

/* hair */

for(let i=0;i<hairCount;i++){

const img=document.createElement("img");

img.src="assets/hair/hair"+i+".png";

img.onclick=()=>{

state.player.hair=i;
render();

};

hairList.appendChild(img);

}

/* clothes */

for(let i=0;i<clothesCount;i++){

const img=document.createElement("img");

img.src="assets/clothes/clothes"+i+".png";

img.onclick=()=>{

state.player.armor=i;
render();

};

clothesList.appendChild(img);

}

/* 描画 */

function render(){

const body = document.getElementById("body");
const legs = document.getElementById("legs");
const hair = document.getElementById("hair");
const clothes = document.getElementById("clothes");

body.src = "assets/body/body"+state.player.body+".png";
legs.src = "assets/legs/legs"+state.player.legs+".png";
hair.src = "assets/hair/hair"+state.player.hair+".png";
clothes.src = "assets/clothes/clothes"+state.player.armor+".png";

body.style.objectPosition = "-64px -128px";
hair.style.objectPosition = "-64px -128px";
clothes.style.objectPosition = "-64px -128px";

/* ズボン */

legs.style.objectPosition = "-64px -128px";

highlightSelection();

}

/* 選択ハイライト */

function highlightSelection(){

document.querySelectorAll(".parts img").forEach(img=>{
img.classList.remove("selected");
});

const bodyImg =
document.querySelector(`[src="assets/body/body${state.player.body}.png"]`);

const legsImg =
document.querySelector(`[src="assets/legs/legs${state.player.legs}.png"]`);

const hairImg =
document.querySelector(`[src="assets/hair/hair${state.player.hair}.png"]`);

const clothesImg =
document.querySelector(`[src="assets/clothes/clothes${state.player.armor}.png"]`);

if(bodyImg) bodyImg.classList.add("selected");
if(legsImg) legsImg.classList.add("selected");
if(hairImg) hairImg.classList.add("selected");
if(clothesImg) clothesImg.classList.add("selected");

}

/* タブ */

function showTab(tab){

document.getElementById("bodyList").style.display="none";
document.getElementById("legsList").style.display="none";
document.getElementById("hairList").style.display="none";
document.getElementById("clothesList").style.display="none";

document.getElementById(tab+"List").style.display="flex";

}

/* ランダム */

function randomChar(){

state.player.body =
Math.floor(Math.random()*bodyCount);

state.player.legs =
Math.floor(Math.random()*legsCount);

state.player.hair =
Math.floor(Math.random()*hairCount);

state.player.armor =
Math.floor(Math.random()*clothesCount);

render();

}

/* 装備外す */

function removeLegs(){
state.player.legs=0;
render();
}

function removeHair(){
state.player.hair=0;
render();
}

function removeClothes(){
state.player.armor=0;
render();
}

/* 保存 */

function saveChar(){

localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

alert("保存しました");

}

render();

</script>

</body>
</html>
