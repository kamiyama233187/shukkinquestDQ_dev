<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>すごろく</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:"MS Gothic", monospace;
}

.container{
  width:95%;
  max-width:700px;
  margin:20px auto;
}

.window{
  border:2px solid white;
  padding:15px;
  margin-bottom:15px;
}

.title{
  text-align:center;
  font-size:22px;
  margin-bottom:10px;
}

.center{
  text-align:center;
}

button{
  background:black;
  color:white;
  border:2px solid white;
  padding:10px 20px;
  font-size:16px;
}

button:active{
  background:white;
  color:black;
}
</style>
</head>

<body>

<div class="container">

<div class="window">
  <div class="title">すごろくの世界</div>
  ここは 冒険者たちの 試練の地。<br>
  サイコロを振り、マスを進め。
</div>

<div class="window center">
  ⚔️ すごろくは現在開発中です。
</div>

<div class="center">
  <button onclick="location.href='index.html'">
    もどる
  </button>
</div>

</div>

</body>
</html>
