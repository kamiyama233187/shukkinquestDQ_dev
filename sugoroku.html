<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>すごろく</title>

<style>
#mapLayer{
  transition: transform 0.25s linear;
  position:relative;
  width:5000px;
  height:3000px;
}

#miniMapBox{
  margin-top:10px;
  text-align:center;
}

#miniMap{
  border:1px solid white;
  background:black;
}

.bossFlashWin {
  animation: bossWinAnim 0.5s ease-in-out 2;
}

.bossFlashLose {
  animation: bossLoseAnim 0.5s ease-in-out 2;
}

@keyframes bossWinAnim {
  0% { background:black; }
  50% { background:darkred; }
  100% { background:black; }
}

@keyframes bossLoseAnim {
  0% { background:black; }
  50% { background:#222; }
  100% { background:black; }
}

.bossWin {
  animation: bossWinFlash 0.6s ease-in-out 2;
}

@keyframes bossWinFlash {
  0%   { background:black; }
  50%  { background:red; }
  100% { background:black; }
}

.bossLose {
  animation: bossLoseFlash 0.6s ease-in-out 2;
}

@keyframes bossLoseFlash {
  0%   { background:black; }
  50%  { background:#330000; }
  100% { background:black; }
}

.rareFlash {
  animation: rareFlashAnim 0.6s ease-in-out 2;
}

@keyframes rareFlashAnim {
  0%   { background:black; }
  50%  { background:gold; }
  100% { background:black; }
}

.bigMessage {
  font-size:22px;
  font-weight:bold;
}

.flash {
  animation: flashAnim 0.35s ease-in-out 2;
}

@keyframes flashAnim {
  0%   { background:white; color:black; transform:scale(1); }
  50%  { background:gold; color:black; transform:scale(1.15); }
  100% { background:white; color:black; transform:scale(1); }
}

.diceRoll {
  animation: diceAnim 0.15s infinite;
}

@keyframes diceAnim {
  0% { transform: rotate(0deg); }
  50% { transform: rotate(15deg); }
  100% { transform: rotate(-15deg); }
}

.map{
  position:relative;
  width:100%;
  height:60vh;
  margin-top:10px;
  border:1px solid white;
  overflow:hidden;
}

.map.full{
  overflow:auto;
}

.zoomFocus{
  transform: scale(1.4);
  transition: transform 0.35s ease;
}

.tile{
  position:absolute;
  width:44px;
  height:44px;
  border:1px solid white;
  text-align:center;
  line-height:44px;
  font-size:12px;
  z-index:1;
background:black;
}

.path{
  position:absolute;
  height:4px;
  background:white;
  transform-origin:left center;
  z-index:0;
}

.player{
  position:absolute;
  font-size:20px;
  pointer-events:none;
  z-index:5;

  transition: left 0.22s linear, top 0.22s linear;
}

.walk{
  animation: walkAnim 0.2s infinite alternate;
}

@keyframes walkAnim{
  from{ transform:translateY(0px); }
  to{ transform:translateY(-2px); }
}

.active{
  background:white;
  color:black;
}

.goal{
  border:2px solid gold;
}

body{
  margin:0;
  background:black;
  color:white;
  font-family:"MS Gothic", monospace;
}

.container{
  width:95%;
  max-width:700px;
  margin:20px auto;
}

.window{
  border:2px solid white;
  padding:15px;
  margin-bottom:15px;
}

.title{
  text-align:center;
  font-size:22px;
  margin-bottom:10px;
}

.center{
  text-align:center;
}

button{
  background:black;
  color:white;
  border:2px solid white;
  padding:10px 20px;
  font-size:16px;
}

button:active{
  background:white;
  color:black;
}
</style>
</head>

<body>

     style="position:fixed;
            bottom:8px;

</div>　

<div class="container">

<div class="window">

<div class="window center">

ステージ：<span id="stageNum">1</span><br>

Lv：<span id="level">1</span><br>

<script>

const STORAGE_KEY = "shukkinQuestData_v3";

let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

const CAMERA_VIEW = 5;
const currentUser = state.currentUser || null;

let currentBranch = null;
if(!state.player){
  state.player = {
    avatar:"🧍",
    hair:0,
    face:0,
    body:0,
    armor:0
  };
}

const STAGE_DATA = {
  1: {
    bossWinRate: 0.6,
    bossDamage: 30,
    healAmount: 15
  },
  2: {
    bossWinRate: 0.5,
    bossDamage: 40,
    healAmount: 10
  },
  3: {
    bossWinRate: 0.4,
    bossDamage: 50,
    healAmount: 5
  }
};

const STAGE_MAP_LENGTH = {
 1:60,
 2:70,
 3:80,
 4:70,
 5:80
};

const STAGE_TILE_RATE = {
  1: {
    plus:0.20,
    minus:0.08,
    rare:0.07,
    heal:0.10,
    boss:0.05,
    cave:0.03
  },
  2: {
    plus:0.15,
    minus:0.12,
    rare:0.07,
    heal:0.06,
    boss:0.08,
    cave:0.05
  },
  3: {
    plus:0.10,
    minus:0.18,
    rare:0.05,
    heal:0.03,
    boss:0.12,
    cave:0.07
  }
};

let devMode = state.devMode || false;

let messageQueue = [];
let isShowingMessage = false;
const walkSE = new Audio("footsteps.mp3");
walkSE.volume = 0.3;

if(!currentUser){
  alert("ログインしてからプレイしてください");
  location.href = "index.html";
}

if(!state.sugoroku){
  state.sugoroku = {
    position: 0,
    stage: 1,
    laps: 0,
    lastPlayDate: null,
    tiles: [],
bonus3Claimed: false,
hp: 100,
maxHp: 100,
inCave: false
  };
  generateMap();
  save();
}

if(state.sugoroku.hp === undefined){
  state.sugoroku.hp = 100;
  state.sugoroku.maxHp = 100;
}

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function todayStr(){
  const d = new Date();
  if(d.getHours() < 7) d.setDate(d.getDate()-1);
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

function rollDice(){

  if(currentBranch){
    showMessage("分かれ道を選んでください！");
    return;
  }

  const today = todayStr();
  const emp = state.employees[currentUser];
  if(!emp) return;

  if(!devMode && emp.sugorokuLastPlayDate === today){
    showMessage("今日はもうプレイできない！");
    return;
  }

  // ① 振った表示（即消える）
 const box = document.getElementById("dqMessage");

box.innerHTML = "🎲";
box.style.display = "block";
box.classList.add("diceRoll");

  const roll = Math.floor(Math.random()*6)+1;

  // ② 少し待って結果表示
 setTimeout(()=>{

  const box = document.getElementById("dqMessage");

  box.classList.remove("diceRoll");

  box.innerHTML = "🎲 " + roll + "！";

    // ③ 結果メッセージが終わったら移動
    setTimeout(()=>{
      startMove(roll, emp, today);
    }, 800);  // ←ここが“間”

  }, 300);
}

function startMove(roll, emp, today){

document.getElementById("player").classList.add("walk");

  let steps = 0;

  const moveInterval = setInterval(()=>{

    const tile = state.sugoroku.tiles[state.sugoroku.position];


if(tile){

  if(tile.type === "branch"){
    // 分岐はここでは止まる
  }
  else if(tile.next && tile.next.length > 0){
    state.sugoroku.position = tile.next[0];
  }
  else{
    state.sugoroku.position += 1;
  }

}
    steps++;

walkSE.currentTime = 0;
walkSE.play();

    // 🎯 ゴール処理
    const length = state.sugoroku.tiles.length;

if(state.sugoroku.position >= length){
      state.sugoroku.position = 0;
      state.sugoroku.laps += 1;
state.sugoroku.stage += 1;

if(state.sugoroku.stage > 5){
  state.sugoroku.stage = 1;
}

generateMap();

      if(!emp.sugorokuLaps){
        emp.sugorokuLaps = 0;
      }

      emp.sugorokuLaps += 1;

      // 🏆 1周
      emp.totalPoints += 50;
      emp.totalEarned += 50;

// ❤️ HP回復
state.sugoroku.hp += 20;
if(state.sugoroku.hp > state.sugoroku.maxHp){
  state.sugoroku.hp = state.sugoroku.maxHp;
}

showMessage("❤️ HPが20回復した！");

      // 🌟 3周
      if(emp.sugorokuLaps === 3 && !emp.sugorokuBonus3){

        emp.totalPoints += 100;
        emp.totalEarned += 100;

        emp.sugorokuBonus3 = true;

        showMessage("🌟 3周達成！100ポイントボーナス！");
      }

      // 🔥 5周称号
      if(emp.sugorokuLaps === 5){
        checkSugorokuTitles(currentUser);
      }

      showMessage("🏆 ゴール！1周達成！");
    }

    render();

// 💀 HP0チェック
if(state.sugoroku.hp <= 0){

  clearInterval(moveInterval);

  showMessage("💀 力尽きた…拠点へ戻される");

  state.sugoroku.position = 0;
  state.sugoroku.hp = state.sugoroku.maxHp;

  render();
  save();
  return;
}

 if(steps >= roll){

document.getElementById("player").classList.remove("walk");

  clearInterval(moveInterval);

  render();

const tiles = document.querySelectorAll(".tile");
const currentTile = tiles[state.sugoroku.position];

if(currentTile){
  currentTile.classList.add("flash");

  setTimeout(()=>{
    currentTile.classList.remove("flash");
  },600);
}

const tileType =
  state.sugoroku.tiles[state.sugoroku.position]?.type;

  setTimeout(()=>{
  handleEvent(tileType);
},600);

  emp.sugorokuLastPlayDate = today;
  save();
}

  }, 200);
}

function render(){

document.getElementById("stageNum").textContent =
  state.sugoroku.stage;

  document.getElementById("pos").textContent =
    state.sugoroku.position;

  const emp = state.employees[currentUser];

const earned = emp.totalEarned || 0;

const levelData = getLevelInfo(earned);

document.getElementById("xp").textContent =
  earned;

document.getElementById("level").textContent =
  levelData.level;

document.getElementById("points").textContent =
  emp.totalPoints || 0;

const nextReq = getNextLevelRequirement(earned);

if(nextReq){

  const remain = nextReq - earned;

  document.getElementById("nextXp").textContent =
    remain;

}else{

  document.getElementById("nextXp").textContent =
    "MAX";
}

document.getElementById("laps").textContent =
  emp.sugorokuLaps || 0;

  const map = document.getElementById("map");
  map.innerHTML = "";

const length = state.sugoroku.tiles.length;

for(let i=0;i<length;i++){
const tileData = state.sugoroku.tiles[i];

    const tile = document.createElement("div");
    tile.className = "tile";
tile.dataset.index = i;

    if(i === state.sugoroku.position){
  tile.classList.add("active");
}

    if(i === state.sugoroku.tiles.length - 1){
      tile.classList.add("goal");
    }

    const type = state.sugoroku.tiles[i]?.type;

   if(i === state.sugoroku.tiles.length - 1){
  tile.textContent = "G";
}
    else if(type === "plus"){
      tile.textContent = "+";
    }
    else if(type === "minus"){
      tile.textContent = "-";
    }
    else if(type === "rare"){
      tile.textContent = "★";
    }
else if(type === "boss"){
  tile.textContent = "⚔";
}
else if(type === "branch"){
  tile.textContent = "↔";
}
else if(type === "exit"){
  tile.textContent = "🚪";
}
else if(type === "treasure"){
  tile.textContent = "🎁";
}
else if(type === "cave"){
  tile.innerHTML = "<img src='cave.png' style='width:20px'>";
}
else if(type === "heal"){
  tile.textContent = "❤";
}
    else{
      tile.textContent = i;
    }


tile.style.left = tileData.x * 60 + "px";
tile.style.top = tileData.y * 60 + "px";
if(i > 0){

  const prev = state.sugoroku.tiles[i-1];

  const x1 = prev.x * 60 + 22;
  const y1 = prev.y * 60 + 22;

  const x2 = tileData.x * 60 + 22;
  const y2 = tileData.y * 60 + 22;

  const dx = x2 - x1;
  const dy = y2 - y1;

  const length = Math.sqrt(dx*dx + dy*dy);

  const angle = Math.atan2(dy, dx) * 180 / Math.PI;

  const path = document.createElement("div");
  path.className = "path";

  path.style.left = x1 + "px";
  path.style.top = y1 + "px";
  path.style.width = length + "px";
  path.style.transform = `rotate(${angle}deg)`;

  map.appendChild(path);
}
    map.appendChild(tile);
  }


const mapLayer = document.getElementById("mapLayer");

if(mapLayer){

  const tileData = state.sugoroku.tiles[state.sugoroku.position];

  const px = tileData.x * 60;
  const py = tileData.y * 60;

  const tileSize = 60;

const view = CAMERA_VIEW;

const cameraX = px - tileSize * view;
const cameraY = py - tileSize * view;

mapLayer.style.transform =
 `translate(${-cameraX}px, ${-cameraY}px)`;

  mapLayer.style.transform =
    `translate(${-cameraX}px, ${-cameraY}px)`;
}

// HPバー更新
const hpPercent =
  (state.sugoroku.hp / state.sugoroku.maxHp) * 100;

const hpBar = document.getElementById("hpBar");
if(hpBar){
  hpBar.style.width = hpPercent + "%";
}

const player = document.getElementById("player");

if(player){

  
const tileData = state.sugoroku.tiles[state.sugoroku.position];

const x = tileData.x * 60;
const y = tileData.y * 60;

player.style.left = (x + 12) + "px";
player.style.top = (y + 10) + "px";

  player.textContent = state.player.avatar;

}
drawMiniMap();
// 視界制限
const tiles = document.querySelectorAll(".tile");

const playerTile =
  state.sugoroku.tiles[state.sugoroku.position];

tiles.forEach(tile=>{

  if(fullMap){
    tile.style.visibility="visible";
    return;
  }

  const index = Number(tile.dataset.index);
  const t = state.sugoroku.tiles[index];

  if(!t) return;

  const dx = Math.abs(t.x - playerTile.x);
  const dy = Math.abs(t.y - playerTile.y);

  if(dx > 5 || dy > 3){
    tile.style.visibility="hidden";
  }else{
    tile.style.visibility="visible";
  }

});
}
const tools = document.getElementById("devTools");

if(devMode){
  tools.style.display = "block";
}else{
  tools.style.display = "none";
}



function generateMap(){

  const stage = state.sugoroku.stage;
  const length = STAGE_MAP_LENGTH[stage];

  state.sugoroku.tiles = [];

  let x = 0;
  let y = 0;

  // 一本道生成
  for(let i=0;i<length;i++){

    x++;

    if(Math.random()<0.35){
      y++;
    }

    state.sugoroku.tiles.push({
  x:x,
  y:y,
  next: i < length-1 ? [i+1] : []
});

  }

  // ゴール
  state.sugoroku.tiles[length-1].type="goal";

  // 分岐生成
  const branchCount = Math.floor(length/12);

  for(let i=0;i<branchCount;i++){

    const start = Math.floor(Math.random()*(length-10))+3;
    const end = start + Math.floor(Math.random()*6)+3;

    if(end>=length-1) continue;

    const branchStart = state.sugoroku.tiles[start];

    branchStart.type="branch";
branchStart.routeType=["safe","danger"];

    const branchIndex = state.sugoroku.tiles.length;

    branchStart.next=[start+1,branchIndex];

    let bx = branchStart.x;
    let by = branchStart.y+1;

    for(let j=start;j<end;j++){

      bx++;

      state.sugoroku.tiles.push({
        x:bx,
        y:by,
        next:[state.sugoroku.tiles.length+1]
      });

    }

    state.sugoroku.tiles[state.sugoroku.tiles.length-1].next=[end];

  }

  // マス内容ランダム
  const rate = STAGE_TILE_RATE[stage];

  state.sugoroku.tiles.forEach(tile=>{

    if(tile.type==="branch" || tile.type==="goal") return;

    const rand=Math.random();

    if(rand<rate.plus) tile.type="plus";
    else if(rand<rate.plus+rate.minus) tile.type="minus";
    else if(rand<rate.plus+rate.minus+rate.rare) tile.type="rare";
    else if(rand<rate.plus+rate.minus+rate.rare+rate.heal) tile.type="heal";
    else if(rand<rate.plus+rate.minus+rate.rare+rate.heal+rate.boss) tile.type="boss";
    else tile.type="none";

  });

}

function generateCave(){
let x = 0;
let y = 0;
  state.sugoroku.tiles = [];

  for(let i=0;i<20;i++){
x += 1;

if(Math.random() < 0.4){
  y += 1;
}

    if(i === 19){
      state.sugoroku.tiles.push({
        type:"exit",
        next:[i+1],
x:x,
  y:y
      });
      continue;
    }

    const rand = Math.random();

    if(rand < 0.15){
      state.sugoroku.tiles.push({
        type:"treasure",
        next:[i+1],
x:x,
  y:y
      });
    }
    else if(rand < 0.35){
      state.sugoroku.tiles.push({
        type:"minus",
        next:[i+1],
x:x,
  y:y
      });
    }
    else if(rand < 0.55){
      state.sugoroku.tiles.push({
        type:"boss",
        next:[i+1],
x:x,
  y:y
      });
    }
    else if(rand < 0.70){
      state.sugoroku.tiles.push({
        type:"rare",
        next:[i+1],
x:x,
  y:y
      });
    }
    else{
      state.sugoroku.tiles.push({
        type:"none",
        next:[i+1],
x:x,
  y:y
      });
    }

  }


}
function handleEvent(type){

  if(!currentUser || !state.employees[currentUser]){
    alert("ログイン情報がありません");
    return;
  }

  const emp = state.employees[currentUser];

if(type === "plus"){

  state.employees[currentUser].totalPoints += 10;
  state.employees[currentUser].totalEarned += 10;

  save();

  showMessage("💰 10ポイント獲得！");
}

if(type === "minus"){

  state.employees[currentUser].totalPoints -= 5;

  if(state.employees[currentUser].totalPoints < 0){
    state.employees[currentUser].totalPoints = 0;
  }

  save();

  showMessage("❌ 5ポイント失った！");
}

if(type === "rare"){

  if(currentUser && state.employees[currentUser]){

    const chance = Math.random();

    if(chance < 0.2){

      // 🔥 超ボーナス
      state.employees[currentUser].totalPoints += 100;
      state.employees[currentUser].totalEarned += 100;

      save();

      showMessage("🌟🌟 超レア発動！100ポイント獲得！！", "rare");

    }else{

      // 通常レア
      state.employees[currentUser].totalPoints += 30;
      state.employees[currentUser].totalEarned += 30;

      save();

      showMessage("⭐ レアマス！30ポイント獲得！", "rare");
    }
  }
}

if(type === "treasure"){

  showMessage("🎁 宝箱を発見！");

  const rand = Math.random();

  if(rand < 0.6){

    const gold = 30 + Math.floor(Math.random()*40);

    state.employees[currentUser].totalPoints += gold;
    state.employees[currentUser].totalEarned += gold;

    showMessage("💰 " + gold + "ポイント手に入れた！");

  }
  else if(rand < 0.9){

    showMessage("🎁 空っぽだった…");

  }
  else{

    state.employees[currentUser].totalPoints += 200;
    state.employees[currentUser].totalEarned += 200;

    showMessage("🌟 超レア宝箱！200ポイント！！","rare");

  }

  save();
}

if(type === "exit"){

  showMessage("🚪 洞窟を脱出した！");

  state.sugoroku.inCave = false;

  generateMap();

  state.sugoroku.position = 0;

  save();
  render();
}

if(type === "cave"){

  showMessage("🕳 洞窟を発見した！");

  setTimeout(()=>{

    const enter = confirm("洞窟に入りますか？");

    if(enter){

    showMessage("🕳 洞窟に入った！");

state.sugoroku.inCave = true;
generateCave();
state.sugoroku.position = 0;

save();
render();

    }else{

      showMessage("外を進むことにした");

    }

  },1000);

}

if(type === "branch"){

  currentBranch = state.sugoroku.tiles[state.sugoroku.position];

  const routes = currentBranch.routeType || ["normal","normal"];

  const labels = {
    safe:"🛡 安全ルート",
    danger:"⚔ 危険ルート",
    treasure:"🎁 宝ルート",
    normal:"一本道"
  };

  document.getElementById("branchBtn0").textContent =
    labels[routes[0]];

  document.getElementById("branchBtn1").textContent =
    labels[routes[1]];

const mapLayer = document.getElementById("mapLayer");

mapLayer.classList.add("zoomFocus");
  document.getElementById("branchUI").style.display = "block";

}



if(type === "boss"){

const stage = state.sugoroku.stage;
const data = STAGE_DATA[stage];

  const chance = Math.random();


 if(chance < data.bossWinRate){

    emp.totalPoints += 80;
    emp.totalEarned += 80;

    document.body.classList.add("bossFlashWin");
    setTimeout(()=>{
      document.body.classList.remove("bossFlashWin");
    }, 800);

    showMessage("⚔ ボス撃破！80ポイント獲得！", "rare");

  }else{

    emp.totalPoints -= 20;
    if(emp.totalPoints < 0) emp.totalPoints = 0;

state.sugoroku.hp -= data.bossDamage;
if(state.sugoroku.hp < 0){
  state.sugoroku.hp = 0;
}

    document.body.classList.add("bossFlashLose");
    setTimeout(()=>{
      document.body.classList.remove("bossFlashLose");
    }, 800);


    showMessage("💀 ボスに敗北…20ポイント減少");
  }

  save();
render();
}

if(type === "heal"){

const stage = state.sugoroku.stage;
const data = STAGE_DATA[stage];

  state.sugoroku.hp += data.healAmount;

  if(state.sugoroku.hp > state.sugoroku.maxHp){
    state.sugoroku.hp = state.sugoroku.maxHp;
  }

  showMessage("❤ HPが" + data.healAmount + "回復した！");

  save();
  render();
}

}

function showMessage(text, type="normal"){

  messageQueue.push({text, type});

  if(!isShowingMessage){
    processMessageQueue();
  }
}

function processMessageQueue(){

  if(messageQueue.length === 0){
    isShowingMessage = false;
    return;
  }

  isShowingMessage = true;

  const {text, type} = messageQueue.shift();

  const box = document.getElementById("dqMessage");

  box.innerHTML = text;
  box.style.display = "block";

  box.classList.remove("bigMessage");

  if(type === "rare"){
    box.classList.add("bigMessage");
    document.body.classList.add("rareFlash");

    setTimeout(()=>{
      document.body.classList.remove("rareFlash");
    },800);
  }

  setTimeout(()=>{
    box.style.display = "none";
    processMessageQueue();
  },2500);
}

function devRoll(){

  const val = parseInt(
    document.getElementById("devSteps").value
  );

  if(isNaN(val)) return;

  state.sugoroku.position += val;

  const length = STAGE_MAP_LENGTH[state.sugoroku.stage];

if(state.sugoroku.position >= length){
    state.sugoroku.position = 0;
    state.sugoroku.laps += 1;
  }

  render();
  save();
}

function forceGoal(){

const length = STAGE_MAP_LENGTH[state.sugoroku.stage];

state.sugoroku.position = length - 1;

  render();
  save();
}

function warpTo(num){
  state.sugoroku.position = num;
  render();
  save();
}

if(!state.sugoroku.tiles || state.sugoroku.tiles.length === 0){
  generateMap();
  save();
}

render();

function devTrigger(type){

  const emp = state.employees[currentUser];
  if(!emp) return;

  if(type === "goal"){
    state.sugoroku.position = 29;
    render();
    showMessage("🏁 強制ゴール！");
    return;
  }

  handleEvent(type);
}

function devHp(amount){

  state.sugoroku.hp += amount;

  if(state.sugoroku.hp > state.sugoroku.maxHp){
    state.sugoroku.hp = state.sugoroku.maxHp;
  }

  if(state.sugoroku.hp < 0){
    state.sugoroku.hp = 0;
  }

  render();
  save();
}

function devFullHp(){
  state.sugoroku.hp = state.sugoroku.maxHp;
  render();
  save();
}

function regenerateMap(){

  generateMap();

  state.sugoroku.position = 0;

  showMessage("🗺 マップを再生成した！");

  save();
  render();
}

function getRequiredExp(level){
  return level * level * 10;
}

function getLevelInfo(total){

  let level = 1;

  for(let i=1;i<=99;i++){
    if(total >= getRequiredExp(i)){
      level = i;
    }else{
      break;
    }
  }

  return { level: level };
}

function getNextLevelRequirement(total){

  const info = getLevelInfo(total);

  if(info.level >= 99) return null;

  return getRequiredExp(info.level + 1);
}

function chooseBranch(index){

  if(!currentBranch) return;

  const nextPos = currentBranch.next[index];

  state.sugoroku.position = nextPos;

  document.getElementById("branchUI").style.display = "none";

const mapLayer = document.getElementById("mapLayer");
mapLayer.classList.remove("zoomFocus");

  currentBranch = null;

  render();

  const tileType =
    state.sugoroku.tiles[state.sugoroku.position]?.type;

  setTimeout(()=>{
  handleEvent(tileType);
},600);

  save();
}

function changeAvatar(icon){

  state.player.avatar = icon;

  save();
  render();

}

function drawMiniMap(){

  const canvas = document.getElementById("miniMap");
  if(!canvas) return;

  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const tiles = state.sugoroku.tiles;

  if(!tiles || tiles.length === 0) return;

  const scale = 4;

  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;

  for(let i=1;i<tiles.length;i++){

    const a = tiles[i-1];
    const b = tiles[i];

    ctx.beginPath();
    ctx.moveTo(a.x*scale+10, a.y*scale+10);
    ctx.lineTo(b.x*scale+10, b.y*scale+10);
    ctx.stroke();

  }

  // プレイヤー
  const p = tiles[state.sugoroku.position];

  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(p.x*scale+10, p.y*scale+10, 3, 0, Math.PI*2);
  ctx.fill();

}

let fullMap = false;

function toggleFullMap(){

  fullMap = !fullMap;

  const mapLayer = document.getElementById("mapLayer");
  const map = document.querySelector(".map");

  if(fullMap){

    mapLayer.style.transform = "translate(0px,0px)";
    map.classList.add("full");

    showMessage("🗺 全体マップ（スクロールできます）");

  }else{

    map.classList.remove("full");

    render();

  }

}

 // バージョン
const version = localStorage.getItem("appVersion");

if(version){
  document.getElementById("versionDisplay").textContent =
    "v" + version;
}else{
  document.getElementById("versionDisplay").textContent =
    "v?";
}
