<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>すごろく</title>

<style>

.bossFlashWin {
  animation: bossWinAnim 0.5s ease-in-out 2;
}

.bossFlashLose {
  animation: bossLoseAnim 0.5s ease-in-out 2;
}

@keyframes bossWinAnim {
  0% { background:black; }
  50% { background:darkred; }
  100% { background:black; }
}

@keyframes bossLoseAnim {
  0% { background:black; }
  50% { background:#222; }
  100% { background:black; }
}

.bossWin {
  animation: bossWinFlash 0.6s ease-in-out 2;
}

@keyframes bossWinFlash {
  0%   { background:black; }
  50%  { background:red; }
  100% { background:black; }
}

.bossLose {
  animation: bossLoseFlash 0.6s ease-in-out 2;
}

@keyframes bossLoseFlash {
  0%   { background:black; }
  50%  { background:#330000; }
  100% { background:black; }
}

.rareFlash {
  animation: rareFlashAnim 0.6s ease-in-out 2;
}

@keyframes rareFlashAnim {
  0%   { background:black; }
  50%  { background:gold; }
  100% { background:black; }
}

.bigMessage {
  font-size:22px;
  font-weight:bold;
}

.flash {
  animation: flashAnim 0.4s ease-in-out 2;
}

@keyframes flashAnim {
  0%   { background:white; color:black; }
  50%  { background:gold; color:black; }
  100% { background:white; color:black; }
}

.map{
  display:grid;
  grid-template-columns: repeat(6, 1fr);
  gap:5px;
  margin-top:10px;
}

.tile{
  border:1px solid white;
  padding:8px 0;
  text-align:center;
  font-size:12px;
}

.active{
  background:white;
  color:black;
}

.goal{
  border:2px solid gold;
}

body{
  margin:0;
  background:black;
  color:white;
  font-family:"MS Gothic", monospace;
}

.container{
  width:95%;
  max-width:700px;
  margin:20px auto;
}

.window{
  border:2px solid white;
  padding:15px;
  margin-bottom:15px;
}

.title{
  text-align:center;
  font-size:22px;
  margin-bottom:10px;
}

.center{
  text-align:center;
}

button{
  background:black;
  color:white;
  border:2px solid white;
  padding:10px 20px;
  font-size:16px;
}

button:active{
  background:white;
  color:black;
}
</style>
</head>

<body>

<div id="versionDisplay"
     style="position:fixed;
            bottom:8px;
            right:12px;
            font-size:11px;
            opacity:0.6;
            pointer-events:none;">
</div>　

<div class="container">

<div class="window">
  <div class="title">すごろくの世界</div>
  ここは 冒険者たちの 試練の地。<br>
  サイコロを振り、マスを進め。
</div>

<div class="window center">
ステージ：<span id="stageNum">1</span><br>

Lv：<span id="level">1</span><br>
所持ポイント：<span id="points">0</span> pt<br>
経験値：<span id="xp">0</span><br><br>

現在位置：<span id="pos">0</span> マス<br>
周回数：<span id="laps">0</span><br><br>

<div style="margin-top:10px;">
  HP
  <div id="hpBarContainer" style="
    width:100%;
    height:14px;
    border:1px solid white;
    margin-top:3px;
  ">
    <div id="hpBar" style="
      width:100%;
      height:100%;
      background:red;
    "></div>
  </div>
</div>

  <button onclick="rollDice()">サイコロを振る</button>

<div id="map" class="map"></div>

</div>

<div id="dqMessage" class="window center" style="display:none;"></div>

<div id="devTools" style="display:none; margin-top:10px;">

  <input type="number" id="devSteps" placeholder="移動数" style="width:80px;">
  <button onclick="devRoll()">指定移動</button>

  <button onclick="forceGoal()">強制ゴール</button>
  <button onclick="warpTo(29)">29へワープ</button>

</div>

<hr style="margin:10px 0; border-color:white;">

<button onclick="devTrigger('plus')">＋マス</button>
<button onclick="devTrigger('minus')">－マス</button>
<button onclick="devTrigger('rare')">レア</button>
<button onclick="devTrigger('boss')">ボス</button>
<button onclick="devTrigger('goal')">ゴール</button>
<button onclick="devHp(10)">❤️ HP +10</button>
<button onclick="devHp(-10)">💔 HP -10</button>
<button onclick="devFullHp()">💯 HP全回復</button>
<button onclick="regenerateMap()">🗺 マップ再生成</button>

<div class="center">
  <button onclick="location.href='index.html'">
    もどる
  </button>
</div>

</div>

<script>

const STORAGE_KEY = "shukkinQuestData_v3";

let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
const currentUser = state.currentUser || null;

const STAGE_DATA = {
  1: {
    bossWinRate: 0.6,
    bossDamage: 30,
    healAmount: 15
  },
  2: {
    bossWinRate: 0.5,
    bossDamage: 40,
    healAmount: 10
  },
  3: {
    bossWinRate: 0.4,
    bossDamage: 50,
    healAmount: 5
  }
};

let devMode = state.devMode || false;

let messageQueue = [];
let isShowingMessage = false;

if(!currentUser){
  alert("ログインしてからプレイしてください");
  location.href = "index.html";
}

if(!state.sugoroku){
  state.sugoroku = {
    position: 0,
    stage: 1,
    laps: 0,
    lastPlayDate: null,
    tiles: [],
bonus3Claimed: false,
hp: 100,
maxHp: 100
  };
  generateMap();
  save();
}

if(state.sugoroku.hp === undefined){
  state.sugoroku.hp = 100;
  state.sugoroku.maxHp = 100;
}

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function todayStr(){
  const d = new Date();
  if(d.getHours() < 7) d.setDate(d.getDate()-1);
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

function rollDice(){

  const today = todayStr();
  const emp = state.employees[currentUser];
  if(!emp) return;

  if(!devMode && emp.sugorokuLastPlayDate === today){
    showMessage("今日はもうプレイできない！");
    return;
  }

  // ① 振った表示（即消える）
  const box = document.getElementById("dqMessage");
  box.innerHTML = "🎲 サイコロを振った！";
  box.style.display = "block";

  const roll = Math.floor(Math.random()*6)+1;

  // ② 少し待って結果表示
  setTimeout(()=>{

    showMessage("🎲 " + roll + " が出た！");

    // ③ 結果メッセージが終わったら移動
    setTimeout(()=>{
      startMove(roll, emp, today);
    }, 800);  // ←ここが“間”

  }, 300);
}

function startMove(roll, emp, today){

  let steps = 0;

  const moveInterval = setInterval(()=>{

    state.sugoroku.position += 1;
    steps++;

    // 🎯 ゴール処理
    if(state.sugoroku.position >= 30){
      state.sugoroku.position = 0;
      state.sugoroku.laps += 1;
state.sugoroku.stage += 1;

if(state.sugoroku.stage > 3){
  state.sugoroku.stage = 1;
}

generateMap();

      if(!emp.sugorokuLaps){
        emp.sugorokuLaps = 0;
      }

      emp.sugorokuLaps += 1;

      // 🏆 1周
      emp.totalPoints += 50;
      emp.totalEarned += 50;

// ❤️ HP回復
state.sugoroku.hp += 20;
if(state.sugoroku.hp > state.sugoroku.maxHp){
  state.sugoroku.hp = state.sugoroku.maxHp;
}

showMessage("❤️ HPが20回復した！");

      // 🌟 3周
      if(emp.sugorokuLaps === 3 && !emp.sugorokuBonus3){

        emp.totalPoints += 100;
        emp.totalEarned += 100;

        emp.sugorokuBonus3 = true;

        showMessage("🌟 3周達成！100ポイントボーナス！");
      }

      // 🔥 5周称号
      if(emp.sugorokuLaps === 5){
        checkSugorokuTitles(currentUser);
      }

      showMessage("🏆 ゴール！1周達成！");
    }

    render();

// 💀 HP0チェック
if(state.sugoroku.hp <= 0){

  clearInterval(moveInterval);

  showMessage("💀 力尽きた…拠点へ戻される");

  state.sugoroku.position = 0;
  state.sugoroku.hp = state.sugoroku.maxHp;

  render();
  save();
  return;
}

 if(steps >= roll){

  clearInterval(moveInterval);

  render();

  const tiles = document.querySelectorAll(".tile");
  const currentTile = tiles[state.sugoroku.position];

  if(currentTile){
    currentTile.classList.add("flash");

    setTimeout(()=>{
      currentTile.classList.remove("flash");
    }, 800);
  }

  const tileType =
    state.sugoroku.tiles[state.sugoroku.position];

  handleEvent(tileType);

  emp.sugorokuLastPlayDate = today;
  save();
}

  }, 250);
}

function render(){

document.getElementById("stageNum").textContent =
  state.sugoroku.stage;

  document.getElementById("pos").textContent =
    state.sugoroku.position;

  const emp = state.employees[currentUser];

document.getElementById("xp").textContent =
  emp.totalEarned || 0;
const levelData = getLevelInfo(emp.totalEarned || 0);
document.getElementById("level").textContent =
  levelData.level;
document.getElementById("points").textContent =
  emp.totalPoints || 0;

document.getElementById("laps").textContent =
  emp.sugorokuLaps || 0;

  const map = document.getElementById("map");
  map.innerHTML = "";

  for(let i=0;i<30;i++){

    const tile = document.createElement("div");
    tile.className = "tile";

    if(i === state.sugoroku.position){
      tile.classList.add("active");
    }

    if(i === 29){
      tile.classList.add("goal");
    }

    const type = state.sugoroku.tiles[i];

    if(i === 29){
      tile.textContent = "G";
    }
    else if(type === "plus"){
      tile.textContent = "+";
    }
    else if(type === "minus"){
      tile.textContent = "-";
    }
    else if(type === "rare"){
      tile.textContent = "★";
    }
else if(type === "boss"){
  tile.textContent = "⚔";
}
else if(type === "heal"){
  tile.textContent = "❤";
}
    else{
      tile.textContent = i;
    }

    map.appendChild(tile);
  }

// HPバー更新
const hpPercent =
  (state.sugoroku.hp / state.sugoroku.maxHp) * 100;

const hpBar = document.getElementById("hpBar");
if(hpBar){
  hpBar.style.width = hpPercent + "%";
}
}

const tools = document.getElementById("devTools");

if(devMode){
  tools.style.display = "block";
}else{
  tools.style.display = "none";
}



function generateMap(){

  state.sugoroku.tiles = [];

  for(let i=0;i<30;i++){

    if(i === 29){
      state.sugoroku.tiles.push("goal");
      continue;
    }

    const rand = Math.random();

if(rand < 0.18){
  state.sugoroku.tiles.push("plus");
}
else if(rand < 0.28){
  state.sugoroku.tiles.push("minus");
}
else if(rand < 0.33){
  state.sugoroku.tiles.push("rare");
}
else if(rand < 0.38){
  state.sugoroku.tiles.push("heal");
}
else if(rand < 0.43){
  state.sugoroku.tiles.push("boss");
}
else{
  state.sugoroku.tiles.push("none");
}
  }
}

function handleEvent(type){

  if(!currentUser || !state.employees[currentUser]){
    alert("ログイン情報がありません");
    return;
  }

  const emp = state.employees[currentUser];

if(type === "plus"){

  state.employees[currentUser].totalPoints += 10;
  state.employees[currentUser].totalEarned += 10;

  save();

  showMessage("💰 10ポイント獲得！");
}

if(type === "minus"){

  state.employees[currentUser].totalPoints -= 5;

  if(state.employees[currentUser].totalPoints < 0){
    state.employees[currentUser].totalPoints = 0;
  }

  save();

  showMessage("❌ 5ポイント失った！");
}

if(type === "rare"){

  if(currentUser && state.employees[currentUser]){

    const chance = Math.random();

    if(chance < 0.2){

      // 🔥 超ボーナス
      state.employees[currentUser].totalPoints += 100;
      state.employees[currentUser].totalEarned += 100;

      save();

      showMessage("🌟🌟 超レア発動！100ポイント獲得！！", "rare");

    }else{

      // 通常レア
      state.employees[currentUser].totalPoints += 30;
      state.employees[currentUser].totalEarned += 30;

      save();

      showMessage("⭐ レアマス！30ポイント獲得！", "rare");
    }
  }
}

if(type === "boss"){

const stage = state.sugoroku.stage;
const data = STAGE_DATA[stage];

  const chance = Math.random();


 if(chance < data.bossWinRate){

    emp.totalPoints += 80;
    emp.totalEarned += 80;

    document.body.classList.add("bossFlashWin");
    setTimeout(()=>{
      document.body.classList.remove("bossFlashWin");
    }, 800);

    showMessage("⚔ ボス撃破！80ポイント獲得！", "rare");

  }else{

    emp.totalPoints -= 20;
    if(emp.totalPoints < 0) emp.totalPoints = 0;

state.sugoroku.hp -= data.bossDamage;
if(state.sugoroku.hp < 0){
  state.sugoroku.hp = 0;
}

    document.body.classList.add("bossFlashLose");
    setTimeout(()=>{
      document.body.classList.remove("bossFlashLose");
    }, 800);


    showMessage("💀 ボスに敗北…20ポイント減少");
  }

  save();
render();
}

if(type === "heal"){

const stage = state.sugoroku.stage;
const data = STAGE_DATA[stage];

  state.sugoroku.hp += data.healAmount;

  if(state.sugoroku.hp > state.sugoroku.maxHp){
    state.sugoroku.hp = state.sugoroku.maxHp;
  }

  showMessage("❤ HPが" + data.healAmount + "回復した！");

  save();
  render();
}

}

function showMessage(text, type="normal"){

  messageQueue.push({text, type});

  if(!isShowingMessage){
    processMessageQueue();
  }
}

function processMessageQueue(){

  if(messageQueue.length === 0){
    isShowingMessage = false;
    return;
  }

  isShowingMessage = true;

  const {text, type} = messageQueue.shift();

  const box = document.getElementById("dqMessage");

  box.innerHTML = text;
  box.style.display = "block";

  box.classList.remove("bigMessage");

  if(type === "rare"){
    box.classList.add("bigMessage");
    document.body.classList.add("rareFlash");

    setTimeout(()=>{
      document.body.classList.remove("rareFlash");
    },800);
  }

  setTimeout(()=>{
    box.style.display = "none";
    processMessageQueue();
  },2500);
}

function devRoll(){

  const val = parseInt(
    document.getElementById("devSteps").value
  );

  if(isNaN(val)) return;

  state.sugoroku.position += val;

  if(state.sugoroku.position >= 30){
    state.sugoroku.position = 0;
    state.sugoroku.laps += 1;
  }

  render();
  save();
}

function forceGoal(){
  state.sugoroku.position = 29;
  render();
  save();
}

function warpTo(num){
  state.sugoroku.position = num;
  render();
  save();
}

if(!state.sugoroku.tiles || state.sugoroku.tiles.length === 0){
  generateMap();
  save();
}

render();

function devTrigger(type){

  const emp = state.employees[currentUser];
  if(!emp) return;

  if(type === "goal"){
    state.sugoroku.position = 29;
    render();
    showMessage("🏁 強制ゴール！");
    return;
  }

  handleEvent(type);
}

function devHp(amount){

  state.sugoroku.hp += amount;

  if(state.sugoroku.hp > state.sugoroku.maxHp){
    state.sugoroku.hp = state.sugoroku.maxHp;
  }

  if(state.sugoroku.hp < 0){
    state.sugoroku.hp = 0;
  }

  render();
  save();
}

function devFullHp(){
  state.sugoroku.hp = state.sugoroku.maxHp;
  render();
  save();
}

function regenerateMap(){

  generateMap();

  state.sugoroku.position = 0;

  showMessage("🗺 マップを再生成した！");

  save();
  render();
}

function getLevelInfo(xp){

  const level = Math.floor(xp / 100) + 1;

  return {
    level: level
  };

}

 // バージョン
const version = localStorage.getItem("appVersion");

if(version){
  document.getElementById("versionDisplay").textContent =
    "v" + version;
}else{
  document.getElementById("versionDisplay").textContent =
    "v?";
}



</script>
</body>
</html>
