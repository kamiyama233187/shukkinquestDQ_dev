<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>すごろく</title>

<style>

.map{
  display:grid;
  grid-template-columns: repeat(6, 1fr);
  gap:5px;
  margin-top:10px;
}

.tile{
  border:1px solid white;
  padding:8px 0;
  text-align:center;
  font-size:12px;
}

.active{
  background:white;
  color:black;
}

.goal{
  border:2px solid gold;
}

body{
  margin:0;
  background:black;
  color:white;
  font-family:"MS Gothic", monospace;
}

.container{
  width:95%;
  max-width:700px;
  margin:20px auto;
}

.window{
  border:2px solid white;
  padding:15px;
  margin-bottom:15px;
}

.title{
  text-align:center;
  font-size:22px;
  margin-bottom:10px;
}

.center{
  text-align:center;
}

button{
  background:black;
  color:white;
  border:2px solid white;
  padding:10px 20px;
  font-size:16px;
}

button:active{
  background:white;
  color:black;
}
</style>
</head>

<body>

<div class="container">

<div class="window">
  <div class="title">すごろくの世界</div>
  ここは 冒険者たちの 試練の地。<br>
  サイコロを振り、マスを進め。
</div>

<div class="window center">
  現在位置：<span id="pos">0</span> マス<br>

  周回数：<span id="laps">0</span><br><br>

  <button onclick="rollDice()">サイコロを振る</button>

<div id="map" class="map"></div>

</div>

<div id="dqMessage" class="window center" style="display:none;"></div>

<div id="devTools" style="display:none; margin-top:10px;">

  <input type="number" id="devSteps" placeholder="移動数" style="width:80px;">
  <button onclick="devRoll()">指定移動</button>

  <button onclick="forceGoal()">強制ゴール</button>
  <button onclick="warpTo(29)">29へワープ</button>

</div>

<div class="center">
  <button onclick="location.href='index.html'">
    もどる
  </button>
</div>

</div>

<script>

const STORAGE_KEY = "shukkinQuestData_v3";

let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
const currentUser = state.currentUser || null;

if(!currentUser){
  alert("ログインしてからプレイしてください");
  location.href = "index.html";
}

if(!state.sugoroku){
  state.sugoroku = {
    position: 0,
    stage: 1,
    laps: 0,
    lastPlayDate: null,
    tiles: [],
bonus3Claimed: false
  };
  generateMap();
  save();
}

function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function todayStr(){
  const d = new Date();
  if(d.getHours() < 7) d.setDate(d.getDate()-1);
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

function rollDice(){

  const today = todayStr();

 if(!devMode && state.sugoroku.lastPlayDate === today){
  showMessage("今日はもうプレイできない！");
  return;
}

  const roll = Math.floor(Math.random()*6)+1;

  let steps = 0;

  const moveInterval = setInterval(()=>{

    state.sugoroku.position += 1;
    steps++;

    // 🎯 ゴール処理
    if(state.sugoroku.position >= 30){

      state.sugoroku.position = 0;
      state.sugoroku.laps += 1;

      // 🔥 従業員ごとの周回数も記録
      if(currentUser && state.employees[currentUser]){

        if(!state.employees[currentUser].sugorokuLaps){
          state.employees[currentUser].sugorokuLaps = 0;
        }

        state.employees[currentUser].sugorokuLaps += 1;

        // 🏆 1周ボーナス
        state.employees[currentUser].totalPoints += 50;
        state.employees[currentUser].totalEarned += 50;

        // 🌟 3周一度きりボーナス
        if(state.sugoroku.laps === 3 && !state.sugoroku.bonus3Claimed){

          state.employees[currentUser].totalPoints += 100;
          state.employees[currentUser].totalEarned += 100;

          state.sugoroku.bonus3Claimed = true;

          showMessage("🌟 3周達成！100ポイントボーナス！");
        }

        // 🔥 5周称号（安全）
        if(state.employees[currentUser].sugorokuLaps === 5){
          // giveTitle は index 側で判定するのが理想だが
          // 念のためここでも呼べる構造にするなら削除可
        }
      }

      showMessage("🏆 ゴール！1周達成！");
    }

    render();

    if(steps >= roll){

      clearInterval(moveInterval);

      const tileType =
        state.sugoroku.tiles[state.sugoroku.position];

      handleEvent(tileType);

      state.sugoroku.lastPlayDate = today;
      save();
    }

  }, 250); // ← 速度（200〜300で調整可）
}

function render(){

  document.getElementById("pos").textContent =
    state.sugoroku.position;

  document.getElementById("laps").textContent =
    state.sugoroku.laps;

  const map = document.getElementById("map");
  map.innerHTML = "";

  for(let i=0;i<30;i++){

    const tile = document.createElement("div");
    tile.className = "tile";

    if(i === state.sugoroku.position){
      tile.classList.add("active");
    }

    if(i === 29){
      tile.classList.add("goal");
    }

    const type = state.sugoroku.tiles[i];

    if(i === 29){
      tile.textContent = "G";
    }
    else if(type === "plus"){
      tile.textContent = "+";
    }
    else if(type === "minus"){
      tile.textContent = "-";
    }
    else if(type === "rare"){
      tile.textContent = "★";
    }
    else{
      tile.textContent = i;
    }

if(devMode){
  document.getElementById("devTools").style.display = "block";
}

    map.appendChild(tile);
  }
}


function generateMap(){

  state.sugoroku.tiles = [];

  for(let i=0;i<30;i++){

    if(i === 29){
      state.sugoroku.tiles.push("goal");
      continue;
    }

    const rand = Math.random();

    if(rand < 0.2){
      state.sugoroku.tiles.push("plus");
    }
    else if(rand < 0.3){
      state.sugoroku.tiles.push("minus");
    }
    else if(rand < 0.35){
      state.sugoroku.tiles.push("rare");
    }
    else{
      state.sugoroku.tiles.push("none");
    }
  }
}

function handleEvent(type){

  if(!currentUser || !state.employees[currentUser]){
    alert("ログイン情報がありません");
    return;
  }

  const emp = state.employees[currentUser];

if(type === "plus"){

  state.employees[currentUser].totalPoints += 10;
  state.employees[currentUser].totalEarned += 10;

  save();

  showMessage("💰 10ポイント獲得！");
}

if(type === "minus"){

  state.employees[currentUser].totalPoints -= 5;

  if(state.employees[currentUser].totalPoints < 0){
    state.employees[currentUser].totalPoints = 0;
  }

  save();

  showMessage("❌ 5ポイント失った！");
}

if(type === "rare"){

  if(currentUser && state.employees[currentUser]){

    const chance = Math.random();

    if(chance < 0.2){

      // 🔥 超ボーナス
      state.employees[currentUser].totalPoints += 100;
      state.employees[currentUser].totalEarned += 100;

      save();

      showMessage("🌟🌟 超レア発動！100ポイント獲得！！");

    }else{

      // 通常レア
      state.employees[currentUser].totalPoints += 30;
      state.employees[currentUser].totalEarned += 30;

      save();

      showMessage("⭐ レアマス！30ポイント獲得！");
    }
  }
}

}


function showMessage(text){

  const box = document.getElementById("dqMessage");

  box.innerHTML = text;
  box.style.display = "block";

  setTimeout(()=>{
    box.style.display = "none";
  },2000);
}

function checkSugorokuTitles(code){

  const emp = state.employees[code];
  if(!emp) return;

  const laps = emp.sugorokuLaps || 0;

  if(laps >= 5){
    giveTitle(code, "sugoroku5");
  }
}

function devRoll(){

  const val = parseInt(
    document.getElementById("devSteps").value
  );

  if(isNaN(val)) return;

  state.sugoroku.position += val;

  if(state.sugoroku.position >= 30){
    state.sugoroku.position = 0;
    state.sugoroku.laps += 1;
  }

  render();
  save();
}

function forceGoal(){
  state.sugoroku.position = 29;
  render();
  save();
}

function warpTo(num){
  state.sugoroku.position = num;
  render();
  save();
}

generateMap();
render();
</script>
</body>
</html>
